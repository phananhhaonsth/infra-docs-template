site_name: Team Operations Docs
site_description: Tài liệu vận hành nội bộ cho team Infrastructure
site_url: http://10.0.7.169:8001/

theme:
        name: material
        language: vi
        palette:
                - scheme: default
                  primary: teal
                  accent: teal
                  toggle:
                          icon: material/brightness-7
                          name: Chuyển sang chế độ tối
                - scheme: slate
                  primary: teal
                  accent: teal
                  toggle:
                          icon: material/brightness-4
                          name: Chuyển sang chế độ sáng
        font:
                text: Inter
                code: Roboto Mono
        features:
                - navigation.instant
                - navigation.instant.progress
                - navigation.tracking
                - navigation.top
                - navigation.indexes
                - search.suggest
                - search.highlight
                - search.share
                - content.code.copy
                - content.code.annotate
                - toc.follow
        icon:
                logo: material/server-network
                repo: fontawesome/brands/github

repo_url: https://github.com/your-org/team-docs
repo_name: your-org/team-docs
edit_uri: edit/main/docs/

plugins:
        - search:
                  lang:
                          - vi
                          - en
        - glightbox:
                  touchNavigation: true
                  loop: false
                  effect: zoom
                  slide_effect: slide
                  width: 100%
                  height: auto
                  zoomable: true
                  draggable: true

markdown_extensions:
        - admonition
        - pymdownx.details
        - pymdownx.superfences:
                  custom_fences:
                          - name: mermaid
                            class: mermaid
                            format: !!python/name:pymdownx.superfences.fence_code_format
        - pymdownx.highlight:
                  anchor_linenums: true
                  line_spans: __span
                  pygments_lang_class: true
        - pymdownx.inlinehilite
        - pymdownx.tabbed:
                  alternate_style: true
        - pymdownx.tasklist:
                  custom_checkbox: true
        - pymdownx.emoji:
                  emoji_index: !!python/name:material.extensions.emoji.twemoji
                  emoji_generator: !!python/name:material.extensions.emoji.to_svg
        - pymdownx.mark
        - pymdownx.keys
        - pymdownx.critic
        - pymdownx.caret
        - pymdownx.tilde
        - attr_list
        - md_in_html
        - def_list
        - footnotes
        - tables
        - toc:
                  permalink: true
                  toc_depth: 3

extra:
        social:
                - icon: fontawesome/brands/github
                  link: https://github.com/your-org/team-docs
        generator: false

extra_css:
        - stylesheets/extra.css

extra_javascript:
        - javascripts/nav-dropdown.js

nav:
        - Home: index.md

        - "🖥️ System":
                  - system/index.md
                  - Server vật lý:
                            - system/server-vat-ly/index.md
                  - Proxmox VE:
                            - system/proxmox/index.md
                            - Cài đặt Proxmox: system/proxmox/cai-dat-proxmox.md
                  - File Server:
                            - system/file-server/index.md
                  - Storage:
                            - system/storage/index.md
                  - Backup & Restore:
                            - system/backup/index.md

                  - vmware:
                            - system/vmware/index.md
        - "🌐 Network":
                  - network/index.md
                  - Firewall:
                            - network/firewall/index.md
                  - Switch Core:
                            - network/switch-core/index.md
                            - Login Switch Core: network/switch-core/login-switch-core.md
                            - Cấu hinh vlan: network/switch-core/cau-hinh-vlan.md
                  - Switch Distribution:
                            - network/switch-distribution/index.md
                  - Switch Access:
                            - network/switch-access/index.md
                  - Controller WiFi:
                            - network/controller-wifi/index.md
                  - UPS:
                            - network/ups/index.md

        - "🏢 Sites":
                  - Hà Nội:
                            - sites/ha-noi/index.md
                  - Đà Nẵng:
                            - sites/da-nang/index.md
                  - Hồ Chí Minh:
                            - sites/ho-chi-minh/index.md

        - "📊 Monitoring & Log":
                  - monitoring/index.md
                  - Zabbix:
                            - monitoring/zabbix/index.md
                  - Wazuh (SIEM):
                            - monitoring/wazuh/index.md
                  - Grafana:
                            - monitoring/grafana/index.md

        - "👤 Account":
                  - Google Workspace:
                            - account/google/index.md
                  - GitHub:
                            - account/github/index.md
                  - GitHub Copilot:
                            - account/copilot/index.md
                  - Slack:
                            - account/slack/index.md
                  - Microsoft 365:
                            - account/microsoft/index.md

        - "🔒 Security":
                  - CrowdStrike Falcon:
                            - security/crowdstrike/index.md
                  - ISO 27001:
                            - security/iso27001/index.md
                  - Security Policy:
                            - security/policy/index.md

        - Hướng dẫn đóng góp: contributing.md

dev_addr: 0.0.0.0:8001
